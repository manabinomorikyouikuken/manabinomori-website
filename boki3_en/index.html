<style>
:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Segoe UI", "Hiragino Sans", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.7; }

header { background: var(--primary); color: #fff; padding: 20px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }

header p  { font-size: 0.78rem; opacity: .8; margin-top: 2px; }
.progress-bar { height: 6px; background: rgba(255,255,255,.3); border-radius: 3px; margin-top: 10px; }
.progress-fill { height: 100%; background: #fff; border-radius: 3px; transition: width .4s; }

/* Layout */
.container { display: flex; max-width: 1120px; margin: 0 auto; padding: 24px 16px; gap: 20px; }

/* Sidebar */
.sidebar { width: 230px; flex-shrink: 0; }
.sidebar h2 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-light); margin-bottom: 8px; }
.week-group { margin-bottom: 16px; }
.week-label { font-size: 0.75rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; padding: 4px 8px; background: var(--primary-light); border-radius: 4px; }
.day-btn { display: flex; align-items: center; gap: 6px; width: 100%; text-align: left; padding: 6px 10px; border: none; background: none; cursor: pointer; border-radius: 6px; font-size: 0.8rem; color: var(--text); transition: background .15s; }
.day-btn:hover { background: var(--border); }
.day-btn.active { background: var(--primary); color: #fff; font-weight: 700; }
.day-btn.done .dot { background: var(--success); }
.day-btn.partial .dot { background: var(--warn); }
.day-btn.locked { color: var(--text-light); cursor: default; }
.day-btn.locked:hover { background: none; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }

/* Main content */
.main { flex: 1; min-width: 0; }
.day-header { background: var(--white); border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; border: 1px solid var(--border); }
.day-header .week-tag { font-size: 0.75rem; font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
.day-header h2 { font-size: 1.25rem; font-weight: 800; }
.day-header p { color: var(--text-light); font-size: 0.87rem; margin-top: 4px; }

/* Key Terms Box */
.key-terms-box { background: var(--sky-light); border: 1px solid var(--sky-border); border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; }
.key-terms-box h3 { font-size: 0.76rem; text-transform: uppercase; letter-spacing: .06em; color: var(--sky); margin-bottom: 10px; font-weight: 700; }
.kt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.kt-card { background: white; border: 1px solid var(--sky-border); border-radius: 7px; padding: 9px 11px; }
.kt-en { font-weight: 700; font-size: 0.87rem; color: var(--text); margin-bottom: 2px; }
.kt-kanji { font-size: 0.98rem; margin: 2px 0; }
.kt-read { font-size: 0.71rem; color: var(--gray); line-height: 1.6; }

/* Dialogue */
.dialogue { background: var(--primary-light); border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; padding: 14px 16px; margin-bottom: 20px; font-size: 0.9rem; }
.dialogue .speaker { font-weight: 700; color: var(--primary); font-size: 0.8rem; margin-bottom: 4px; }
.dialogue .line { margin-bottom: 6px; }
.dialogue .line:last-child { margin-bottom: 0; }

/* Question card */
.q-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 14px; }
.q-num { font-size: 0.74rem; font-weight: 700; color: var(--text-light); margin-bottom: 6px; }
.q-text { font-size: 0.95rem; font-weight: 600; margin-bottom: 14px; }
.q-sub { font-size: 0.85rem; color: var(--text-light); margin-bottom: 14px; background: var(--bg); padding: 8px 12px; border-radius: 6px; }
.jterm { font-size: 0.8em; color: var(--gray); font-weight: 400; }

/* Choices */
.choices { display: flex; flex-direction: column; gap: 8px; }
.choice-btn { padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--white); text-align: left; cursor: pointer; font-size: 0.87rem; transition: border-color .15s, background .15s; }
.choice-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-light); }
.choice-btn.correct { border-color: var(--success); background: var(--success-light); color: var(--success); font-weight: 700; }
.choice-btn.wrong   { border-color: var(--error);   background: var(--error-light);   color: var(--error); }

/* Fill input */
.fill-area { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.fill-input { border: 2px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; outline: none; min-width: 170px; }
.fill-input:focus { border-color: var(--primary); }
.fill-input.correct { border-color: var(--success); background: var(--success-light); }
.fill-input.wrong   { border-color: var(--error);   background: var(--error-light); }

/* Buttons */
.btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-gray    { background: var(--border); color: var(--text); }

/* Explanation */
.explanation { margin-top: 12px; padding: 12px 14px; background: var(--warn-light); border-left: 3px solid var(--warn); border-radius: 0 8px 8px 0; font-size: 0.85rem; display: none; }
.explanation.show { display: block; }
.explanation strong { color: var(--warn); }

/* Score box */
.score-box { background: var(--white); border: 2px solid var(--primary); border-radius: 12px; padding: 24px; text-align: center; margin-top: 20px; display: none; }
.score-box.show { display: block; }
.score-big { font-size: 2.5rem; font-weight: 800; color: var(--primary); }
.score-msg { font-size: 1rem; margin-top: 6px; font-weight: 600; }

/* Locked day */
.locked-panel { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 48px 24px; text-align: center; margin-top: 20px; }
.locked-panel .lock-icon { font-size: 3rem; margin-bottom: 14px; }
.locked-panel h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
.locked-panel p { color: var(--text-light); font-size: 0.88rem; max-width: 380px; margin: 0 auto; }

/* Responsive */
@media (max-width: 700px) {
  .container { flex-direction: column; padding: 12px; }
  .sidebar { width: 100%; }
  .week-group { display: inline-flex; flex-wrap: wrap; gap: 4px; }
  .kt-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
</style>

// =============================================
// State
// =============================================
let currentDay = 1;
const state = JSON.parse(localStorage.getItem('boki3en_state') || '{}');

function saveState() {
  localStorage.setItem('boki3en_state', JSON.stringify(state));
}

function getDayScore(day) {
  const d = DAYS[day];
  if (!d || d.locked) return { answered: 0, correct: 0, total: 0 };
  const total = d.questions.length;
  let answered = 0, correct = 0;
  d.questions.forEach(q => {
    if (state[q.id] !== undefined) {
      answered++;
      if (state[q.id] === true) correct++;
    }
  });
  return { answered, correct, total };
}

function getTotalProgress() {
  let done = 0, unlockedCount = 0;
  for (let d = 1; d <= 30; d++) {
    if (DAYS[d] && !DAYS[d].locked) {
      unlockedCount++;
      const { answered, total } = getDayScore(d);
      if (total > 0 && answered >= total) done++;
    }
  }
  return unlockedCount > 0 ? Math.round(done / unlockedCount * 100) : 0;
}

// =============================================
// Sidebar
// =============================================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<h2>30-Day Curriculum</h2>';
  WEEKS.forEach(w => {
    const wg = document.createElement('div');
    wg.className = 'week-group';
    wg.innerHTML = `<div class="week-label">${w.label}</div>`;
    w.days.forEach(d => {
      const day = DAYS[d];
      const { answered, correct, total } = getDayScore(d);
      const isDone = !day.locked && answered >= total && total > 0;
      const isPartial = !day.locked && answered > 0 && !isDone;
      const btn = document.createElement('button');
      const lockIcon = day.locked ? '🔒 ' : '';
      btn.className = 'day-btn'
        + (d === currentDay ? ' active' : '')
        + (isDone ? ' done' : isPartial ? ' partial' : '')
        + (day.locked ? ' locked' : '');
      btn.innerHTML = `<span class="dot"></span>${lockIcon}Day ${d}: ${day.title}`;
      btn.onclick = () => { currentDay = d; renderAll(); window.scrollTo(0,0); };
      wg.appendChild(btn);
    });
    sb.appendChild(wg);
  });
}

// =============================================
// Main Content
// =============================================
function renderMain() {
  const main = document.getElementById('main');
  const day = DAYS[currentDay];
  if (!day) return;

  if (day.locked) {
    main.innerHTML = `
      <div class="locked-panel">
        <div class="lock-icon">🔒</div>
        <h2>${day.week} — Day ${currentDay}: ${day.title}</h2>
        <p>This lesson is coming soon! Complete Week 1 first, then we'll unlock Weeks 2–4.</p>
        <p style="margin-top:10px;font-size:.8rem;">（このレッスンは近日公開予定です）</p>
      </div>`;
    return;
  }

  const { answered, correct, total } = getDayScore(currentDay);
  const allDone = answered >= total && total > 0;

  let html = `
    <div class="day-header">
      <span class="week-tag">${day.week}</span>
      <h2>Day ${currentDay}: ${day.title}</h2>
      <p>🎯 Goal: ${day.goal}</p>
    </div>`;

  if (day.terms && day.terms.length > 0) {
    html += `<div class="key-terms-box"><h3>📖 Key Terms for Today</h3><div class="kt-grid">`;
    day.terms.forEach(t => {
      html += `<div class="kt-card">
        <div class="kt-en">${t.en}</div>
        <div class="kt-kanji">${t.kanji}</div>
        <div class="kt-read">${t.katakana} &nbsp;·&nbsp; ${t.romaji}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="dialogue"><div class="speaker">💬 Introduction</div>`;
  day.dialogue.forEach(l => {
    html += `<div class="line"><strong>${l.speaker}:</strong> ${l.text}</div>`;
  });
  html += `</div>`;

  day.questions.forEach((q, i) => {
    html += renderQuestion(q, i + 1);
  });

  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const msg = pct === 100
    ? '🎉 Perfect score! Outstanding!'
    : pct >= 70 ? '👍 Above passing mark! Keep it up!'
    : '📚 Review the explanations and try again!';
  html += `
    <div class="score-box ${allDone ? 'show' : ''}" id="scoreBox">
      <div class="score-big">${correct} / ${total}</div>
      <div class="score-msg">${msg} &nbsp;(Score: ${pct}%)</div>
      <br>
      ${currentDay === 30
        ? `<p style="color:var(--success);font-weight:700;font-size:1.1rem;">🏆 All 30 Days Complete! Good luck on your exam!</p>`
        : [7,14,21].includes(currentDay)
          ? `<p style="color:var(--success);font-weight:700;">🏅 Week ${Math.ceil(currentDay/7)} Complete!</p>
             <button class="btn btn-primary" style="margin-top:10px" onclick="goNext()">Start Week ${Math.ceil(currentDay/7)+1} →</button>`
          : `<button class="btn btn-primary" onclick="goNext()">Next Day →</button>`
      }
    </div>`;

  main.innerHTML = html;
  attachHandlers(day);
}

function renderQuestion(q, num) {
  const answered = state[q.id] !== undefined;
  const isCorrect = state[q.id] === true;

  if (q.type === 'choice') {
    const choicesHtml = q.choices.map((c, i) => {
      let cls = 'choice-btn';
      if (answered) {
        if (i === q.answer) cls += ' correct';
        else if (!isCorrect && state[q.id + '_sel'] === i) cls += ' wrong';
      }
      return `<button class="${cls}" data-qid="${q.id}" data-idx="${i}" ${answered ? 'disabled' : ''}>${c}</button>`;
    }).join('');
    return `
      <div class="q-card">
        <div class="q-num">Question ${num}</div>
        <div class="q-text">${q.text}</div>
        ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
        <div class="choices">${choicesHtml}</div>
        <div class="explanation ${answered ? 'show' : ''}" id="exp_${q.id}">
          <strong>${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</strong> &nbsp;${q.explanation}
        </div>
      </div>`;
  }

  if (q.type === 'fill') {
    const val = state[q.id + '_val'] || '';
    const cls = answered ? (isCorrect ? 'correct' : 'wrong') : '';
    return `
      <div class="q-card">
        <div class="q-num">Question ${num}</div>
        <div class="q-text">${q.text}</div>
        ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
        ${q.hint ? `<p style="font-size:.8rem;color:var(--gray);margin-bottom:8px;">💡 ${q.hint}</p>` : ''}
        <div class="fill-area">
          <input class="fill-input ${cls}" id="fill_${q.id}" type="text" placeholder="Enter your answer"
            value="${val}" ${answered ? 'disabled' : ''}/>
          ${q.unit ? `<span style="font-size:.85rem;color:var(--gray)">${q.unit}</span>` : ''}
          ${!answered ? `<button class="btn btn-primary" onclick="checkFill('${q.id}')">Check</button>` : ''}
        </div>
        <div class="explanation ${answered ? 'show' : ''}" id="exp_${q.id}">
          <strong>${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</strong> &nbsp;${q.explanation}
        </div>
      </div>`;
  }
  return '';
}

// =============================================
// Event Handlers
// =============================================
function attachHandlers(day) {
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const qid = btn.dataset.qid;
      const idx = parseInt(btn.dataset.idx);
      const q = day.questions.find(x => x.id === qid);
      if (!q || state[qid] !== undefined) return;
      state[qid] = (idx === q.answer);
      state[qid + '_sel'] = idx;
      saveState();
      renderAll();
    });
  });
}

function checkFill(qid) {
  const day = DAYS[currentDay];
  const q = day.questions.find(x => x.id === qid);
  const input = document.getElementById('fill_' + qid);
  const val = input.value.trim().replace(/,/g, '').replace(/¥/g, '');
  const ans = q.answer.replace(/,/g, '');
  state[qid] = (val === ans);
  state[qid + '_val'] = input.value.trim();
  saveState();
  renderAll();
}

function goNext() {
  if (currentDay < 30) { currentDay++; renderAll(); window.scrollTo(0,0); }
}

function renderAll() {
  renderSidebar();
  renderMain();
  document.getElementById('progressFill').style.width = getTotalProgress() + '%';
}

renderAll();
</script>
