  <style>
    :root {
      --bg: #f7f5ef;
      --accent: #58735a;
      --accent-dark: #415843;
      --ink: #1f2a1f;
      --sub: #58635b;
      --line: #d7ddd6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(20,40,20,0.10);
      text-align: center;
    }
    .check {
      width: 72px; height: 72px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--ink);
    }
    .sub {
      color: var(--sub);
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 32px;
    }
    .note {
      font-size: 0.82rem;
      color: #999;
      margin-top: 8px;
      line-height: 1.7;
    }
    .mail-box {
      background: #f7faf6;
      border: 1px solid #d7ddd6;
      border-radius: 12px;
      padding: 20px;
      margin: 0 0 16px;
      text-align: left;
      color: var(--sub);
      line-height: 1.8;
      font-size: 0.95rem;
    }
    .mail-box strong {
      color: var(--accent-dark);
    }
    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 32px 0;
    }
    .product-info {
      background: #f7faf6;
      border: 1px solid #d7ddd6;
      border-radius: 10px;
      padding: 20px;
      text-align: left;
      margin-bottom: 28px;
    }
    .product-info h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--accent-dark);
    }
    .product-info ul {
      list-style: none;
      font-size: 0.9rem;
      color: var(--sub);
      line-height: 1.9;
    }
    .product-info ul li::before {
      content: "✓ ";
      color: var(--accent);
      font-weight: 700;
    }
    .footer-link {
      font-size: 0.85rem;
      color: var(--sub);
      margin-top: 24px;
    }
    .footer-link a { color: var(--accent); }
