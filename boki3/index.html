<html lang="ja">
<head>
<meta charset="UTF-8">

<title>簿記3級 30日合格問題集｜もりもりまなぶ</title>
<style>
:root {
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --error: #dc2626;
  --error-light: #fef2f2;
  --warn: #d97706;
  --warn-light: #fffbeb;
  --gray: #6b7280;
  --border: #e5e7eb;
  --bg: #f9fafb;
  --white: #ffffff;
  --text: #111827;
  --text-light: #6b7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Hiragino Sans", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.7; }

/* ヘッダー */
header { background: var(--primary); color: #fff; padding: 20px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
header h1 { font-size: 1.1rem; font-weight: 700; }
header p  { font-size: 0.8rem; opacity: .8; margin-top: 2px; }
.progress-bar { height: 6px; background: rgba(255,255,255,.3); border-radius: 3px; margin-top: 10px; }
.progress-fill { height: 100%; background: #fff; border-radius: 3px; transition: width .4s; }

/* レイアウト */
.container { display: flex; max-width: 1100px; margin: 0 auto; padding: 24px 16px; gap: 20px; }

/* サイドバー */
.sidebar { width: 220px; flex-shrink: 0; }
.sidebar h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-light); margin-bottom: 8px; }
.week-group { margin-bottom: 16px; }
.week-label { font-size: 0.75rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; padding: 4px 8px; background: var(--primary-light); border-radius: 4px; }
.day-btn { display: flex; align-items: center; gap: 6px; width: 100%; text-align: left; padding: 6px 10px; border: none; background: none; cursor: pointer; border-radius: 6px; font-size: 0.82rem; color: var(--text); transition: background .15s; }
.day-btn:hover { background: var(--border); }
.day-btn.active { background: var(--primary); color: #fff; font-weight: 700; }
.day-btn.done .dot { background: var(--success); }
.day-btn.partial .dot { background: var(--warn); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }

/* メインコンテンツ */
.main { flex: 1; min-width: 0; }
.day-header { background: var(--white); border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; border: 1px solid var(--border); }
.day-header .week-tag { font-size: 0.75rem; font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
.day-header h2 { font-size: 1.3rem; font-weight: 800; }
.day-header p { color: var(--text-light); font-size: 0.88rem; margin-top: 4px; }

/* キャラクター対話 */
.dialogue { background: var(--primary-light); border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; padding: 14px 16px; margin-bottom: 20px; font-size: 0.9rem; }
.dialogue .speaker { font-weight: 700; color: var(--primary); font-size: 0.82rem; margin-bottom: 4px; }
.dialogue .line { margin-bottom: 6px; }
.dialogue .line:last-child { margin-bottom: 0; }

/* 問題カード */
.q-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 14px; }
.q-num { font-size: 0.75rem; font-weight: 700; color: var(--text-light); margin-bottom: 6px; }
.q-text { font-size: 0.95rem; font-weight: 600; margin-bottom: 14px; }
.q-sub { font-size: 0.85rem; color: var(--text-light); margin-bottom: 14px; background: var(--bg); padding: 8px 12px; border-radius: 6px; }

/* 選択肢 */
.choices { display: flex; flex-direction: column; gap: 8px; }
.choice-btn { padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; background: var(--white); text-align: left; cursor: pointer; font-size: 0.88rem; transition: border-color .15s, background .15s; }
.choice-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-light); }
.choice-btn.correct { border-color: var(--success); background: var(--success-light); color: var(--success); font-weight: 700; }
.choice-btn.wrong   { border-color: var(--error);   background: var(--error-light);   color: var(--error); }

/* 記述入力 */
.fill-area { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.fill-input { border: 2px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; outline: none; min-width: 160px; }
.fill-input:focus { border-color: var(--primary); }
.fill-input.correct { border-color: var(--success); background: var(--success-light); }
.fill-input.wrong   { border-color: var(--error);   background: var(--error-light); }

/* 仕訳入力 */
.shiwake-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
.shiwake-grid select { border: 2px solid var(--border); border-radius: 8px; padding: 8px; font-size: 0.85rem; background: var(--white); outline: none; }
.shiwake-grid select:focus { border-color: var(--primary); }
.shiwake-arrow { color: var(--text-light); font-size: 1.2rem; text-align: center; }
.shiwake-grid.correct select { border-color: var(--success); background: var(--success-light); }
.shiwake-grid.wrong   select { border-color: var(--error);   background: var(--error-light); }

/* ボタン */
.btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-gray    { background: var(--border); color: var(--text); }

/* 解説 */
.explanation { margin-top: 12px; padding: 12px 14px; background: var(--warn-light); border-left: 3px solid var(--warn); border-radius: 0 8px 8px 0; font-size: 0.85rem; display: none; }
.explanation.show { display: block; }
.explanation strong { color: var(--warn); }

/* スコア */
.score-box { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-top: 20px; text-align: center; display: none; }
.score-box.show { display: block; }
.score-big { font-size: 3rem; font-weight: 900; color: var(--primary); }
.score-msg { color: var(--text-light); margin-top: 4px; }

/* レスポンシブ */
@media (max-width: 720px) {
  .container { flex-direction: column; }
  .sidebar { width: 100%; }
  .week-group { display: inline-flex; flex-wrap: wrap; gap: 4px; }
  .day-btn { width: auto; }
}

// =============================================
// 状態管理
// =============================================
let currentDay = 1;
const state = JSON.parse(localStorage.getItem('boki3_state') || '{}');

function saveState() {
  localStorage.setItem('boki3_state', JSON.stringify(state));
}

function getDayScore(day) {
  const d = DAYS[day];
  if (!d) return { answered: 0, correct: 0, total: d?.questions?.length || 0 };
  const total = d.questions.length;
  let answered = 0, correct = 0;
  d.questions.forEach(q => {
    if (state[q.id] !== undefined) {
      answered++;
      if (state[q.id] === true) correct++;
    }
  });
  return { answered, correct, total };
}

function getTotalProgress() {
  let done = 0;
  for (let d = 1; d <= 30; d++) {
    const { answered, total } = getDayScore(d);
    if (answered >= total && total > 0) done++;
  }
  return Math.round(done / 30 * 100);
}

// =============================================
// サイドバー描画
// =============================================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<h2>30日カリキュラム</h2>';
  WEEKS.forEach(w => {
    const wg = document.createElement('div');
    wg.className = 'week-group';
    wg.innerHTML = `<div class="week-label">${w.label}</div>`;
    w.days.forEach(d => {
      const { answered, correct, total } = getDayScore(d);
      const isDone = answered >= total && total > 0;
      const isPartial = answered > 0 && !isDone;
      const btn = document.createElement('button');
      btn.className = 'day-btn' + (d === currentDay ? ' active' : '') + (isDone ? ' done' : isPartial ? ' partial' : '');
      btn.innerHTML = `<span class="dot"></span>Day ${d}：${DAYS[d].title}`;
      btn.onclick = () => { currentDay = d; renderAll(); };
      wg.appendChild(btn);
    });
    sb.appendChild(wg);
  });
}

// =============================================
// メインコンテンツ描画
// =============================================
function renderMain() {
  const main = document.getElementById('main');
  const day = DAYS[currentDay];
  if (!day) return;

  const { answered, correct, total } = getDayScore(currentDay);

  let html = `
    <div class="day-header">
      <span class="week-tag">${day.week}</span>
      <h2>Day ${currentDay}：${day.title}</h2>
      <p>🎯 目標：${day.goal}</p>
    </div>
    <div class="dialogue">
      <div class="speaker">💬 今日の導入</div>
      ${day.dialogue.map(l => `<div class="line"><strong>${l.speaker}：</strong>${l.text}</div>`).join('')}
    </div>
  `;

  day.questions.forEach((q, i) => {
    html += renderQuestion(q, i + 1);
  });

  // スコアボックス
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const msg = pct === 100 ? '🎉 パーフェクト！完璧です！' : pct >= 70 ? '👍 合格ライン突破！' : '📚 もう一度復習しよう';
  html += `
    <div class="score-box ${answered >= total && total > 0 ? 'show' : ''}" id="scoreBox">
      <div class="score-big">${correct} / ${total}</div>
      <div class="score-msg">${msg}（正答率 ${pct}%）</div>
      <br>
      ${currentDay < 30 ? `<button class="btn btn-primary" onclick="goNext()">次のDay へ →</button>` : '<p>🏆 30日間お疲れ様でした！合格を目指して本番へ！</p>'}
    </div>
  `;

  main.innerHTML = html;
  attachHandlers(day);
}

function renderQuestion(q, num) {
  const answered = state[q.id] !== undefined;
  const isCorrect = state[q.id] === true;

  if (q.type === 'choice') {
    let choicesHtml = q.choices.map((c, i) => {
      let cls = 'choice-btn';
      if (answered) {
        if (i === q.answer) cls += ' correct';
        else if (answered && !isCorrect && state[q.id + '_selected'] === i) cls += ' wrong';
      }
      return `<button class="${cls}" data-qid="${q.id}" data-idx="${i}" ${answered ? 'disabled' : ''}>${c}</button>`;
    }).join('');
    return `
      <div class="q-card">
        <div class="q-num">問題 ${num}</div>
        <div class="q-text">${q.text}</div>
        ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
        <div class="choices">${choicesHtml}</div>
        <div class="explanation ${answered ? 'show' : ''}" id="exp_${q.id}">
          <strong>${isCorrect ? '✅ 正解！' : '❌ 不正解'}</strong>　${q.explanation}
        </div>
      </div>`;
  }

  if (q.type === 'fill') {
    const val = state[q.id + '_val'] || '';
    const cls = answered ? (isCorrect ? 'correct' : 'wrong') : '';
    return `
      <div class="q-card">
        <div class="q-num">問題 ${num}</div>
        <div class="q-text">${q.text}</div>
        ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
        <div class="fill-area">
          <input class="fill-input ${cls}" id="fill_${q.id}" type="text" placeholder="答えを入力" value="${val}" ${answered ? 'disabled' : ''}/>
          ${q.unit ? `<span>${q.unit}</span>` : ''}
          ${!answered ? `<button class="btn btn-primary" onclick="checkFill('${q.id}')">確認</button>` : ''}
        </div>
        <div class="explanation ${answered ? 'show' : ''}" id="exp_${q.id}">
          <strong>${isCorrect ? '✅ 正解！' : '❌ 不正解'}</strong>　${q.explanation}
        </div>
      </div>`;
  }
  return '';
}

// =============================================
// インタラクション
// =============================================
function attachHandlers(day) {
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const qid = btn.dataset.qid;
      const idx = parseInt(btn.dataset.idx);
      const q = day.questions.find(x => x.id === qid);
      if (!q || state[qid] !== undefined) return;
      const correct = idx === q.answer;
      state[qid] = correct;
      state[qid + '_selected'] = idx;
      saveState();
      checkDayComplete(day);
      renderAll();
    });
  });
}

function checkFill(qid) {
  const day = DAYS[currentDay];
  const q = day.questions.find(x => x.id === qid);
  const input = document.getElementById('fill_' + qid);
  const val = input.value.trim().replace(/,/g, '');
  const correct = val === q.answer.replace(/,/g, '');
  state[qid] = correct;
  state[qid + '_val'] = input.value.trim();
  saveState();
  checkDayComplete(day);
  renderAll();
}

function checkDayComplete(day) {
  const allAnswered = day.questions.every(q => state[q.id] !== undefined);
  if (allAnswered) {
    document.getElementById('scoreBox')?.classList.add('show');
  }
}

function goNext() {
  if (currentDay < 30) {
    currentDay++;
    renderAll();
    window.scrollTo(0, 0);
  }
}

function renderAll() {
  renderSidebar();
  renderMain();
  document.getElementById('progressFill').style.width = getTotalProgress() + '%';
}

// 初期描画
renderAll();
</script>
</body>
</html>
